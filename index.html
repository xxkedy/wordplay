<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>BAR EXAM</title>
<meta name="theme-color" content="#0d0d0f" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&display=swap');
:root{
  --bg:#0d0d0f; --panel:#161618; --panel2:#121214; --line:#26262a;
  --ink:#f2f0ea; --muted:#8b8b93;
  --yel:#ffe14d; --grn:#4ade80; --red:#f87171; --amb:#fbbf24;
  --disp:'Big Shoulders Display',-apple-system,'Hiragino Sans',sans-serif;
  --body:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  --lyric:Georgia,'Times New Roman','Hiragino Mincho ProN',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--body);
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
  max-width:520px;margin:0 auto;font-size:15px;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.screen{display:none}.screen.on{display:block}
/* ---------- HOME ---------- */
.logo{font-family:var(--disp);font-weight:900;font-size:42px;letter-spacing:1px;line-height:1;display:flex;align-items:baseline;gap:8px}
.logo .hl{background:var(--yel);color:#111;padding:2px 8px 0;border-radius:4px}
.tag{color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.4px}
.stats{display:flex;gap:8px;margin:16px 0 12px}
.stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 10px}
.stat .n{font-family:var(--disp);font-weight:900;font-size:24px;color:var(--yel);line-height:1.1}
.stat .l{font-size:10.5px;color:var(--muted);letter-spacing:.5px}
/* calendar */
.cal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.calh{display:flex;align-items:center;margin-bottom:8px}
.calh .m{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:1px}
.calh button{color:var(--muted);font-size:16px;padding:2px 12px}
.calh .sp{margin-left:auto;font-size:11px;color:var(--muted)}
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.calg .wd{font-size:9px;color:var(--muted);padding:2px 0}
.calg .d{font-size:11px;color:#6b6b73;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px}
.calg .d.done{background:var(--yel);color:#111;font-weight:800}
.calg .d.today{outline:1.5px solid var(--yel);outline-offset:-1.5px;color:var(--ink)}
.calg .d.done.today{color:#111}
.review{width:100%;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#2a1c05,#181005);
  border:1px solid #4a3410;border-radius:14px;padding:13px 14px;margin-bottom:18px;text-align:left}
.review .fire{font-size:24px}
.review .rt{font-weight:800;color:var(--amb);font-size:15px}
.review .rs{font-size:11.5px;color:#c9a24d}
.review .cnt{margin-left:auto;font-family:var(--disp);font-weight:900;font-size:28px;color:var(--amb)}
.review[disabled]{opacity:.4}
.sec{font-size:11px;color:var(--muted);letter-spacing:2px;margin:0 0 8px 2px}
.track{width:100%;display:flex;align-items:center;gap:12px;background:var(--panel);
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;text-align:left;transition:transform .08s}
.track:active{transform:scale(.985)}
.track .no{font-family:var(--disp);font-weight:900;font-size:20px;width:32px;flex:none}
.track .tt{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.5px;line-height:1.1}
.track .ts{font-size:11px;color:var(--muted);margin-top:2px}
.track .st{margin-left:auto;font-size:14px;flex:none}
.track.lock{opacity:.35}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:16px;line-height:1.7}
/* ---------- QUIZ ---------- */
.qhead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.qhead .back{color:var(--muted);font-size:13px;padding:6px 8px 6px 0}
.qhead .mode{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:1px}
.dots{display:flex;gap:4px;margin-left:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#26262a}
.dot.ok{background:var(--grn)}.dot.ng{background:var(--red)}.dot.now{background:var(--yel)}
.emo{font-size:54px;text-align:center;margin:10px 0 0;line-height:1.2}
.word{font-family:var(--disp);font-weight:900;font-size:46px;line-height:1;letter-spacing:.5px;
  margin:4px 0 2px;word-break:break-word;text-align:center}
.wq{color:var(--muted);font-size:12.5px;margin-bottom:14px;text-align:center}
.choices{display:grid;gap:8px}
.ch{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  text-align:left;font-size:14.5px;color:var(--ink);transition:transform .08s}
.ch:active{transform:scale(.985)}
.ch.ok{background:#122616;border-color:var(--grn);color:#c9f5d9}
.ch.ng{background:#2a1212;border-color:var(--red);color:#ffd3d3}
.ch.dim{opacity:.4}
/* BAR card — Genius風アノテーション */
.bar{display:none;margin-top:14px;background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;padding:14px 15px}
.bar.on{display:block;animation:up .22s ease-out}
.bar .bl{font-size:9.5px;color:var(--muted);letter-spacing:2.5px;margin-bottom:8px}
.bar .bx{font-family:var(--lyric);font-size:17px;line-height:1.65;font-style:italic;color:#eceae2}
.bar .bx mark{background:var(--yel);color:#111;font-weight:700;font-style:normal;padding:0 4px;border-radius:3px}
.bar .bj{margin-top:6px;font-size:12.5px;color:var(--muted);line-height:1.6}
.bar .bm{margin-top:10px;padding-top:9px;border-top:1px dashed #2c2c31;font-size:14px;color:var(--yel);font-weight:700}
.bar .miss{margin-top:5px;font-size:11.5px;color:var(--amb)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.bar.on{animation:none}}
.next{display:none;width:100%;margin-top:13px;background:var(--yel);
  color:#111;font-weight:900;font-size:16px;padding:15px;border-radius:13px}
.next.on{display:block}
/* ---------- RESULT ---------- */
.rwrap{text-align:center;padding-top:22px}
.rnum{font-family:var(--disp);font-weight:900;font-size:78px;line-height:1;color:var(--yel)}
.rnum small{font-size:28px;color:var(--muted)}
.rmsg{font-size:17px;font-weight:800;margin:10px 0 2px}
.rmsg.clear{color:var(--grn)}
.rsub{color:var(--muted);font-size:12.5px}
.rlist{margin-top:18px;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line);font-size:13.5px}
.rrow:last-child{border-bottom:none}
.rrow .re{font-size:18px;flex:none}
.rrow .rw{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.3px;flex:none}
.rrow .rm{color:var(--muted);margin-left:auto;text-align:right;font-size:12px;line-height:1.4}
.rrow.ng2{background:#1c1113}
.rrow.ng2 .rm{color:#f3b0b0}
.rrow .mk{flex:none;font-weight:900}
.rrow .mk.o{color:var(--grn)}.rrow .mk.x{color:var(--red)}
.rbtns{display:grid;gap:10px;margin-top:20px}
.rb{padding:14px;border-radius:13px;font-weight:800;font-size:15px}
.rb.p{background:var(--yel);color:#111}
.rb.s{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<section class="screen on" id="home">
  <h1 class="logo">BAR <span class="hl">EXAM</span></h1>
  <p class="tag">歌詞がわかる スラング200語 · 4択ドリル</p>
  <div class="stats">
    <div class="stat"><div class="n" id="stStreak">0</div><div class="l">🔥 連続日数</div></div>
    <div class="stat"><div class="n" id="stTotal">0</div><div class="l">通算正解</div></div>
    <div class="stat"><div class="n" id="stRate">–</div><div class="l">正答率</div></div>
    <div class="stat"><div class="n" id="stClear">0<span style="font-size:13px;color:var(--muted)">/8</span></div><div class="l">クリア</div></div>
  </div>
  <div class="cal">
    <div class="calh">
      <button id="calPrev">&#9664;</button>
      <span class="m" id="calM"></span>
      <button id="calNext">&#9654;</button>
      <span class="sp">セッション完了で塗られる</span>
    </div>
    <div class="calg" id="calG"></div>
  </div>
  <button class="review" id="reviewBtn">
    <span class="fire">&#128293;</span>
    <span><span class="rt">復習デッキ</span><br><span class="rs">ミスった語。正解で消える</span></span>
    <span class="cnt" id="deckCnt">0</span>
  </button>
  <p class="sec">TRACKLIST — 8/10でクリア→次が解放</p>
  <div id="tracks"></div>
  <p class="foot">記録は端末に保存 · 例文は全てオリジナルの書き下ろし</p>
</section>

<!-- ===== QUIZ ===== -->
<section class="screen" id="quiz">
  <div class="qhead">
    <button class="back" id="backBtn">&larr; やめる</button>
    <span class="mode" id="qMode"></span>
    <div class="dots" id="dots"></div>
  </div>
  <div class="emo" id="qEmo"></div>
  <div class="word" id="qWord"></div>
  <p class="wq">この意味は？</p>
  <div class="choices" id="choices"></div>
  <div class="bar" id="bar">
    <div class="bl">&#9999;&#65039; BAR — こう使う</div>
    <div class="bx" id="barEx"></div>
    <div class="bj" id="barJa"></div>
    <div class="bm" id="barM"></div>
    <div class="miss" id="barMiss"></div>
  </div>
  <button class="next" id="nextBtn">NEXT &rarr;</button>
</section>

<!-- ===== RESULT ===== -->
<section class="screen" id="result">
  <div class="rwrap">
    <div class="rnum"><span id="rScore">0</span><small id="rOf">/10</small></div>
    <p class="rmsg" id="rMsg"></p>
    <p class="rsub" id="rSub"></p>
    <div class="rlist" id="rList"></div>
    <div class="rbtns">
      <button class="rb p" id="rAgain"></button>
      <button class="rb s" id="rHome">ホームへ</button>
    </div>
  </div>
</section>

<script>
/* ============ DATA : 200語 {w,m,e,ex,ja,lv} ============ */
var WORDS=[
/* T1 STARTER 基本スラング (25) */
{w:"cap",m:"嘘・盛った話",e:"🧢",ex:"They say they grind all night, that's cap, I seen them sleep.",ja:"一晩中やってるって言うけど嘘や、寝とるの見たし。",lv:1},
{w:"drip",g:"p1",m:"イケてる服装・スタイル",e:"💧",ex:"Stepped in the booth and the drip did the talking first.",ja:"ブースに入った瞬間、服が先に語った。",lv:1},
{w:"flex",m:"見せびらかす・自慢する",e:"💪",ex:"I don't flex the watch, I flex the hours that it took.",ja:"時計やなくて、そこに懸けた時間を自慢する。",lv:1},
{w:"lit",g:"p1",m:"（場・パーティーが）ぶち上がってる",e:"🎉",ex:"The show got lit the second the 808 dropped.",ja:"808が落ちた瞬間、会場がぶち上がった。",lv:1},
{w:"fam",m:"家族同然の仲間",e:"🫂",ex:"Money come and go, but fam stay on the guest list.",ja:"金は出入りするけど、ファムはずっとゲストリストにおる。",lv:1},
{w:"bet",m:"了解・任せろ",e:"🤝",ex:"You want the hook by Friday? Bet, consider it done.",ja:"金曜までにフック欲しい？よっしゃ、もう終わったも同然。",lv:1},
{w:"salty",m:"不機嫌・僻んでる",e:"🧂",ex:"He's salty 'cause my demo played before his did.",ja:"俺のデモが先に流れたから拗ねとる。",lv:1},
{w:"ghost",m:"急に連絡を絶つ",e:"👻",ex:"Fake friends ghost you the week the numbers drop.",ja:"数字が落ちた週、偽物の友達は消える。",lv:1},
{w:"vibe",m:"雰囲気・ノリ",e:"🌊",ex:"Kill the lights, keep the vibe, let the chords breathe.",ja:"照明を落としてバイブスは残せ、コードを呼吸させろ。",lv:1},
{w:"hype",m:"盛り上げ・期待感",e:"📣",ex:"Don't believe the hype, believe the playback count.",ja:"評判やなくて再生数を信じろ。",lv:1},
{w:"clout",m:"影響力・注目",e:"📈",ex:"Chasing clout is a loan you pay back with your soul.",ja:"注目を追うのは、魂で返すローンや。",lv:1},
{w:"savage",g:"p1",m:"容赦ない・えげつない",e:"😤",ex:"That verse was savage, no names but everybody knew.",ja:"あのバースは容赦なかった。名指しせんでも全員わかった。",lv:1},
{w:"lowkey",m:"ひそかに・控えめに",e:"🤫",ex:"Lowkey I mixed that whole tape in my bedroom.",ja:"実はあのテープ、全部寝室でミックスした。",lv:1},
{w:"highkey",m:"あからさまに・マジで",e:"📢",ex:"Highkey this beat is the best thing I made all year.",ja:"マジでこのビート、今年一番の出来や。",lv:1},
{w:"slaps",g:"p1",m:"（曲が）最高にいい",e:"🔊",ex:"Play it in the whip once — if it slaps, it ships.",ja:"車で一回かけてみ。ヤバかったらリリースや。",lv:1},
{w:"fire",g:"p1",m:"（作品・物が）最高・ヤバい",e:"🔥",ex:"The rough mix was already fire before mastering.",ja:"マスタリング前のラフミックスで既にヤバかった。",lv:1},
{w:"GOAT",g:"p1",m:"史上最高（Greatest Of All Time）",e:"🐐",ex:"Every GOAT was once a rookie nobody replied to.",ja:"どのGOATも最初は誰にも返信されんルーキーやった。",lv:1},
{w:"mid",m:"凡庸・イマイチ",e:"😐",ex:"I'd rather drop nothing than drop something mid.",ja:"イマイチな曲を出すくらいなら何も出さん方がマシ。",lv:1},
{w:"sus",m:"怪しい",e:"🕵️",ex:"A deal with no paperwork? That's sus, walk away.",ja:"書面なしの契約？怪しすぎる、離れろ。",lv:1},
{w:"shade",m:"遠回しの悪口",e:"🕶️",ex:"She threw shade in the interview, I threw a hit back.",ja:"インタビューで遠回しにディスられたから、ヒット曲で返した。",lv:1},
{w:"fly",g:"p1",m:"（服装・見た目が）キマってる",e:"🕊️",ex:"New fit, clean kicks — walked in fly like the intro.",ja:"新しい服にキレイなスニーカー、イントロみたいにイケて登場。",lv:1},
{w:"dope",g:"p1",m:"ナイス・イケてる（褒め全般）",e:"👌",ex:"The demo was rough but the concept was dope.",ja:"デモは粗かったけどコンセプトは最高やった。",lv:1},
{w:"wack",m:"ダサい・しょぼい",e:"👎",ex:"Copying the trend is wack, twisting it is art.",ja:"流行の真似はダサい、ひねったら芸術や。",lv:1},
{w:"hater",m:"難癖つける奴・アンチ",e:"🙄",ex:"A hater is a fan who won't admit the truth.",ja:"アンチとは、真実を認めたくないファンのこと。",lv:1},
{w:"cop",m:"買う・手に入れる",e:"🛍️",ex:"Saved for months to cop the mic I really wanted.",ja:"何ヶ月も貯めて、本命のマイクを手に入れた。",lv:1},
/* T2 IN THE BOOTH ラップ用語 (25) */
{w:"bars",m:"リリックの行・ライム",e:"📝",ex:"He came with bars so heavy the beat got quiet.",ja:"バースが重すぎてビートが静かに聞こえた。",lv:2},
{w:"sixteen",m:"16小節のバース",e:"1️⃣6️⃣",ex:"Give me one sixteen and I'll change the whole song.",ja:"16小節くれたら曲ごと変えてみせる。",lv:2},
{w:"flow",m:"ラップのリズム・乗り方",e:"🌊",ex:"Switch the flow mid-verse and watch the room lean in.",ja:"バースの途中でフロウを変えたら、部屋中が前のめりになる。",lv:2},
{w:"hook",m:"サビ・フック",e:"🪝",ex:"A good hook is a chorus you can't put down.",ja:"いいフックとは、手放せなくなるサビのこと。",lv:2},
{w:"verse",m:"バース・歌の一節",e:"🎼",ex:"The first verse is the résumé, make it count.",ja:"最初のバースは履歴書や、無駄にするな。",lv:2},
{w:"punchline",m:"決めの一行・パンチライン",e:"🥊",ex:"The punchline landed two bars after you heard it.",ja:"パンチラインは、聴いた2小節後に効いてくる。",lv:2},
{w:"freestyle",m:"即興ラップ",e:"🎲",ex:"A freestyle shows what's left when the paper's gone.",ja:"フリースタイルは、紙が無くなった時に残るものを見せる。",lv:2},
{w:"off the dome",m:"即興で・頭から直で",e:"🧠",ex:"No notes, off the dome, and it still rhymed clean.",ja:"メモなし、即興、それでもライムはきれいに揃った。",lv:2},
{w:"cypher",m:"サイファー・輪になってラップ",e:"⭕",ex:"The cypher don't care about your followers, just your turn.",ja:"サイファーはフォロワー数を気にせん、順番だけや。",lv:2},
{w:"diss",m:"相手を攻撃する・ディス",e:"⚔️",ex:"The best answer to a diss is a better song.",ja:"ディスへの最高の返事は、もっといい曲や。",lv:2},
{w:"remix",m:"リミックス・作り直し",e:"🔁",ex:"The remix gave an old song a brand-new zip code.",ja:"リミックスが古い曲に新しい住所をくれた。",lv:2},
{w:"mixtape",m:"ミックステープ・非公式作品集",e:"📼",ex:"The mixtape was free, the respect was expensive.",ja:"ミックステープは無料、得たリスペクトは高価やった。",lv:2},
{w:"feature",m:"客演・フィーチャリング",e:"🤝",ex:"One feature with the right artist beats ten ads.",ja:"正しい相手との客演1本は、広告10本に勝つ。",lv:2},
{w:"sample",m:"サンプリング音源",e:"💿",ex:"Found the sample in a dusty crate for three dollars.",ja:"埃かぶったレコード箱から3ドルでサンプルを見つけた。",lv:2},
{w:"beat",m:"ビート・トラック",e:"🥁",ex:"The beat was talking, so I just answered it.",ja:"ビートが語りかけてきたから、ただ返事した。",lv:2},
{w:"808",m:"重低音ベース（TR-808由来）",e:"🔉",ex:"Turn the 808 up until the mirror shakes.",ja:"鏡が揺れるまで808を上げろ。",lv:2},
{w:"spit",m:"ラップする・吐き出す",e:"🎙️",ex:"She can spit for days without touching a pen.",ja:"彼女はペンに触れんでも何日でもラップできる。",lv:2},
{w:"drop",m:"リリースする・落とす",e:"📅",ex:"We drop Friday, tell everybody who doubted.",ja:"金曜リリースや、疑ってた奴ら全員に伝えろ。",lv:2},
{w:"banger",m:"ぶち上がる曲",e:"💥",ex:"You don't plan a banger, you catch one.",ja:"バンガーは計画して作るもんやない、捕まえるもんや。",lv:2},
{w:"wordplay",m:"言葉遊び・掛け言葉",e:"🧩",ex:"The wordplay hits different on the third listen.",ja:"ワードプレイは3回目に聴いた時、違って響く。",lv:2},
{w:"ad-lib",m:"合いの手・アドリブ",e:"🗯️",ex:"The ad-lib in the back made the line twice as big.",ja:"後ろのアドリブが、そのラインを倍デカくした。",lv:2},
{w:"delivery",m:"歌い回し・声の届け方",e:"📦",ex:"Same lyrics, new delivery — suddenly it's a hit.",ja:"同じ歌詞でも歌い回しを変えたら、急にヒットになった。",lv:2},
{w:"ghostwriter",m:"ゴーストライター",e:"✍️",ex:"A ghostwriter wins games he can never celebrate.",ja:"ゴーストライターは、祝えん試合に勝ち続ける。",lv:2},
{w:"demo",m:"デモ音源",e:"🎧",ex:"Every classic album started life as a shy demo.",ja:"どの名盤も、最初は控えめなデモやった。",lv:2},
{w:"instrumental",m:"インスト・カラオケ音源",e:"🎹",ex:"Loop the instrumental and let the night write the words.",ja:"インストをループさせて、夜に歌詞を書かせろ。",lv:2},
/* T3 REAL TALK 縮約形・歌詞の文法 (25) */
{w:"tryna",m:"〜しようとしてる（trying to）",e:"🎯",ex:"I'm tryna build a catalog, not a moment.",ja:"一瞬やなくて、カタログを作ろうとしてる。",lv:3},

{w:"outta",m:"〜の外へ（out of）",e:"🚪",ex:"One way in, no way outta the studio till it's done.",ja:"入口は一つ、完成までスタジオから出る道はない。",lv:3},
{w:"kinda",m:"ちょっと・なんか（kind of）",e:"🤏",ex:"It's kinda crazy how the B-side became the anthem.",ja:"B面がアンセムになるとか、ちょっとおかしいやろ。",lv:3},

{w:"prolly",m:"たぶん（probably）",e:"🎱",ex:"They prolly sleep on this now and quote it later.",ja:"たぶん今はスルーして、後で引用してくる。",lv:3},

];
var LEVELS=[
 {no:"01",en:"STARTER",jp:"基本スラング",c:"#22d3ee"},
 {no:"02",en:"IN THE BOOTH",jp:"ラップ用語",c:"#ffe14d"},
 {no:"03",en:"REAL TALK",jp:"縮約形・歌詞の文法",c:"#4ade80"},
 {no:"04",en:"LYRIC BASICS",jp:"深いテーマ語",c:"#fb923c"},
 {no:"05",en:"STREET TALK",jp:"ストリート語",c:"#f87171"},
 {no:"06",en:"MONEY TALK",jp:"金・フレックス",c:"#a3e635"},
 {no:"07",en:"NEW WAVE",jp:"最新スラング",c:"#2dd4bf"},
 {no:"08",en:"PHRASES",jp:"決めフレーズ",c:"#fbbf24"}
];
/* ============ STATE ============ */
var KEY='barexam_v1';
var S={cleared:[false,false,false,false,false,false,false,false],deck:[],tot:{a:0,c:0},days:[]};
function load(){try{var d=JSON.parse(localStorage.getItem(KEY));if(d&&d.cleared){S=d;if(!S.days)S.days=[]}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}
function $(id){return document.getElementById(id)}
function show(id){['home','quiz','result'].forEach(function(s){$(s).classList.toggle('on',s===id)});window.scrollTo(0,0)}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function unlocked(lv){return lv===1||S.cleared[lv-2]}
function dstr(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)}
/* ============ CALENDAR ============ */
var calY,calM;
function initCal(){var n=new Date();calY=n.getFullYear();calM=n.getMonth()}
function streak(){
  var s=0,d=new Date(),t=dstr(d);
  if(S.days.indexOf(t)<0)d.setDate(d.getDate()-1);
  while(S.days.indexOf(dstr(d))>=0){s++;d.setDate(d.getDate()-1)}
  return s;
}
function renderCal(){
  $('calM').textContent=calY+'.'+('0'+(calM+1)).slice(-2);
  var first=new Date(calY,calM,1).getDay();
  var last=new Date(calY,calM+1,0).getDate();
  var today=dstr(new Date());
  var h='';['日','月','火','水','木','金','土'].forEach(function(w){h+='<span class="wd">'+w+'</span>'});
  for(var b=0;b<first;b++)h+='<span></span>';
  for(var d=1;d<=last;d++){
    var ds=calY+'-'+('0'+(calM+1)).slice(-2)+'-'+('0'+d).slice(-2);
    var c='d'+(S.days.indexOf(ds)>=0?' done':'')+(ds===today?' today':'');
    h+='<span class="'+c+'">'+d+'</span>';
  }
  $('calG').innerHTML=h;
}
/* ============ HOME ============ */
function renderHome(){
  $('stStreak').textContent=streak();
  $('stTotal').textContent=S.tot.c;
  $('stRate').textContent=S.tot.a?Math.round(S.tot.c/S.tot.a*100)+'%':'–';
  var cl=S.cleared.filter(Boolean).length;
  $('stClear').innerHTML=cl+'<span style="font-size:13px;color:var(--muted)">/8</span>';
  $('deckCnt').textContent=S.deck.length;
  $('reviewBtn').disabled=S.deck.length===0;
  renderCal();
  var h='';
  LEVELS.forEach(function(L,i){
    var lv=i+1,un=unlocked(lv),cl2=S.cleared[i];
    h+='<button class="track'+(un?'':' lock')+'" data-lv="'+lv+'" '+(un?'':'disabled')+'>'
      +'<span class="no" style="color:'+L.c+'">'+L.no+'</span>'
      +'<span><span class="tt">'+L.en+'</span><br><span class="ts">'+L.jp+' · 25語</span></span>'
      +'<span class="st">'+(cl2?'✅':(un?'▶':'🔒'))+'</span></button>';
  });
  $('tracks').innerHTML=h;
  Array.prototype.forEach.call(document.querySelectorAll('.track'),function(b){
    b.addEventListener('click',function(){startLevel(parseInt(b.dataset.lv,10))});
  });
}
$('calPrev').addEventListener('click',function(){calM--;if(calM<0){calM=11;calY--}renderCal()});
$('calNext').addEventListener('click',function(){calM++;if(calM>11){calM=0;calY++}renderCal()});
/* ============ QUIZ ============ */
var Q={mode:'level',lv:1,list:[],i:0,score:0,res:[]};
function startLevel(lv){
  Q={mode:'level',lv:lv,list:shuffle(WORDS.filter(function(w){return w.lv===lv})).slice(0,10),i:0,score:0,res:[]};
  $('qMode').textContent='TRACK '+LEVELS[lv-1].no+' · '+LEVELS[lv-1].en;
  $('qMode').style.color=LEVELS[lv-1].c;
  show('quiz');next();
}
function startReview(){
  if(!S.deck.length)return;
  var pool=WORDS.filter(function(w){return S.deck.indexOf(w.w)>=0});
  Q={mode:'review',lv:0,list:shuffle(pool.slice()).slice(0,10),i:0,score:0,res:[]};
  $('qMode').textContent='🔥 REVIEW';
  $('qMode').style.color='var(--amb)';
  show('quiz');next();
}
function dots(){
  var h='';
  for(var k=0;k<Q.list.length;k++){
    var c='dot';
    if(k<Q.res.length)c+=Q.res[k]?' ok':' ng';
    else if(k===Q.i)c+=' now';
    h+='<span class="'+c+'"></span>';
  }
  $('dots').innerHTML=h;
}
function next(){
  if(Q.i>=Q.list.length){finish();return}
  var w=Q.list[Q.i];
  dots();
  $('qEmo').textContent=w.e;
  $('qWord').textContent=w.w;
  $('bar').classList.remove('on');
  $('nextBtn').classList.remove('on');
  var others=shuffle(WORDS.filter(function(x){return x.w!==w.w&&x.lv===w.lv&&(!w.g||x.g!==w.g)}).map(function(x){return x.m}));
  if(others.length<3)others=others.concat(shuffle(WORDS.filter(function(x){return x.w!==w.w&&(!w.g||x.g!==w.g)}).map(function(x){return x.m})));
  var opts=shuffle([w.m,others[0],others[1],others[2]]);
  var h='';
  opts.forEach(function(o){h+='<button class="ch">'+o+'</button>'});
  $('choices').innerHTML=h;
  Array.prototype.forEach.call(document.querySelectorAll('.ch'),function(b){
    b.addEventListener('click',function(){answer(b,w)});
  });
}
function answer(btn,w){
  var right=btn.textContent===w.m;
  Array.prototype.forEach.call(document.querySelectorAll('.ch'),function(b){
    b.disabled=true;
    if(b.textContent===w.m)b.classList.add('ok');
    else if(b===btn)b.classList.add('ng');
    else b.classList.add('dim');
  });
  Q.res.push(right);
  S.tot.a++;
  if(right){
    Q.score++;S.tot.c++;
    if(Q.mode==='review'){var ix=S.deck.indexOf(w.w);if(ix>=0)S.deck.splice(ix,1)}
  }else{
    if(S.deck.indexOf(w.w)<0)S.deck.push(w.w);
  }
  save();dots();
  var esc=w.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('('+esc+')','i');
  $('barEx').innerHTML=w.ex.replace(re,'<mark>$1</mark>');
  $('barJa').textContent='🇯🇵 '+w.ja;
  $('barM').textContent=w.e+' '+w.w+' ＝ '+w.m;
  $('barMiss').textContent=right?'':(Q.mode==='review'?'🔥 まだデッキに残る':'🔥 復習デッキに追加した');
  $('bar').classList.add('on');
  $('nextBtn').classList.add('on');
}
$('nextBtn').addEventListener('click',function(){Q.i++;next()});
$('backBtn').addEventListener('click',function(){renderHome();show('home')});
/* ============ RESULT ============ */
function markDay(){var t=dstr(new Date());if(S.days.indexOf(t)<0){S.days.push(t);save()}}
function finish(){
  markDay();
  var n=Q.list.length;
  $('rScore').textContent=Q.score;
  $('rOf').textContent='/'+n;
  if(Q.mode==='level'){
    var cleared=Q.score>=8;
    if(cleared&&!S.cleared[Q.lv-1]){S.cleared[Q.lv-1]=true;save()}
    $('rMsg').textContent=cleared?'CLEAR!':'あと少し';
    $('rMsg').className='rmsg'+(cleared?' clear':'');
    $('rSub').textContent=cleared
      ?(Q.lv<8?'TRACK '+LEVELS[Q.lv].no+'「'+LEVELS[Q.lv].en+'」が解放された':'全トラック制覇。あとは復習デッキを空にするだけ')
      :'8問正解でクリア。ミスは🔥復習デッキに入っとる';
    $('rAgain').textContent='もう一回';
    $('rAgain').onclick=function(){startLevel(Q.lv)};
  }else{
    $('rMsg').textContent=S.deck.length===0?'デッキ空！':'消し込み中';
    $('rMsg').className='rmsg'+(S.deck.length===0?' clear':'');
    $('rSub').textContent='残り '+S.deck.length+' 語';
    $('rAgain').textContent=S.deck.length?'続けて復習':'ホームへ';
    $('rAgain').onclick=function(){S.deck.length?startReview():(renderHome(),show('home'))};
  }
  var h='';
  Q.list.forEach(function(w,i){
    var ok=Q.res[i];
    h+='<div class="rrow'+(ok?'':' ng2')+'">'
      +'<span class="mk '+(ok?'o':'x')+'">'+(ok?'○':'×')+'</span>'
      +'<span class="re">'+w.e+'</span>'
      +'<span class="rw">'+w.w+'</span>'
      +'<span class="rm">'+w.m+'</span></div>';
  });
  $('rList').innerHTML=h;
  show('result');
}
$('rHome').addEventListener('click',function(){renderHome();show('home')});
$('reviewBtn').addEventListener('click',startReview);
/* ============ INIT ============ */
load();initCal();renderHome();
</script>
</body>
